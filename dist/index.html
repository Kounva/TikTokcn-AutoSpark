<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>抖音火花助手</title>
    <link rel="stylesheet" href="/lib/element-plus.css">
    <style>
      /* ============================================================
         抖音火花助手 — 液态玻璃拟态 · 马卡龙渐变 · 潮流极简轻奢
         Glassmorphism Pro Max — Desktop Admin Panel
         ============================================================ */

      *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
      html, body, #app {
        width: 100%; height: 100%;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
        -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
        overflow: hidden;
      }

      /* ============================================================
         DESIGN TOKENS — CSS Variables
         ============================================================ */
      :root {
        /* ── Background Layers ── */
        --bg-void: #f0f3ff;
        --bg-deep: #f5f6fd;
        --bg-surface: #ffffff;
        --bg-ambient: #edeef8;

        /* ── Glass Materials (3-tier depth) ── */
        --glass-1: rgba(255,255,255,0.38);
        --glass-2: rgba(255,255,255,0.55);
        --glass-3: rgba(255,255,255,0.72);
        --glass-hover: rgba(255,255,255,0.85);
        --glass-border: rgba(255,255,255,0.5);
        --glass-border-soft: rgba(200,210,240,0.32);
        --glass-highlight: rgba(255,255,255,0.7);
        --glass-dark: rgba(230,235,250,0.55);

        /* ── Macaron Gradient Palette ── */
        --macaron-blue: #a5b4fc;
        --macaron-purple: #c4b5fd;
        --macaron-mint: #a7f3d0;
        --macaron-cyan: #67e8f9;
        --macaron-pink: #f9a8d4;
        --macaron-peach: #fed7aa;
        --macaron-lavender: #ddd6fe;

        /* ── Primary Gradient (清透蓝紫 → 青柠浅绿) ── */
        --gradient-primary: linear-gradient(135deg, #7b8cff 0%, #a78bfa 30%, #67e8f9 65%, #6ee7b7 100%);
        --gradient-primary-soft: linear-gradient(135deg, rgba(123,140,255,0.12) 0%, rgba(167,139,250,0.08) 40%, rgba(103,232,249,0.1) 70%, rgba(110,231,183,0.08) 100%);
        --gradient-card: linear-gradient(135deg, rgba(123,140,255,0.06) 0%, rgba(167,139,250,0.04) 50%, rgba(103,232,249,0.05) 100%);
        --gradient-fire: linear-gradient(135deg, #6366f1 0%, #8b5cf6 40%, #06b6d4 100%);
        --gradient-fire-soft: linear-gradient(135deg, rgba(99,102,241,0.12) 0%, rgba(139,92,246,0.08) 40%, rgba(6,182,212,0.1) 100%);

        /* ── Text ── */
        --text-primary: #1e1b2e;
        --text-secondary: #5c5a72;
        --text-muted: #8e8ca6;
        --text-dim: #b8b6c8;

        /* ── Accent Colors ── */
        --accent: #6366f1;
        --accent-light: #818cf8;
        --accent-purple: #8b5cf6;
        --accent-cyan: #06b6d4;
        --accent-mint: #10b981;
        --accent-pink: #ec4899;
        --accent-coral: #f472b6;
        --accent-amber: #f59e0b;
        --accent-soft: rgba(99,102,241,0.1);
        --accent-glow: rgba(99,102,241,0.2);

        /* ── Status ── */
        --success: #10b981;
        --warning: #f59e0b;
        --danger: #ef4444;
        --info: #6366f1;

        /* ── Shadows (soft diffused) ── */
        --shadow-1: 0 1px 3px rgba(100,100,160,0.05);
        --shadow-2: 0 4px 16px rgba(100,100,160,0.07);
        --shadow-3: 0 8px 32px rgba(100,100,160,0.1);
        --shadow-4: 0 20px 60px rgba(100,100,160,0.14);
        --shadow-glow: 0 0 50px rgba(99,102,241,0.12);
        --shadow-inset: inset 0 1px 0 rgba(255,255,255,0.8);

        /* ── Radius ── */
        --r-sm: 12px;
        --r-md: 16px;
        --r-lg: 20px;
        --r-xl: 24px;
        --r-2xl: 32px;

        /* ── Motion ── */
        --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
        --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
        --ease-smooth: cubic-bezier(0.4, 0, 0.2, 1);
        --dur-fast: 0.2s;
        --dur: 0.35s;
        --dur-slow: 0.6s;
      }

      /* ============================================================
         ELEMENT PLUS — FULL THEME OVERRIDE
         ============================================================ */
      :root {
        --el-color-primary: #6366f1;
        --el-color-primary-light-3: #818cf8;
        --el-color-primary-light-5: #a5b4fc;
        --el-color-primary-light-7: #c7d2fe;
        --el-color-primary-light-8: #ddd6fe;
        --el-color-primary-light-9: rgba(99,102,241,0.1);
        --el-color-primary-dark-2: #4f46e5;
        --el-color-success: #10b981;
        --el-color-warning: #f59e0b;
        --el-color-danger: #ef4444;
        --el-color-info: #6366f1;
        --el-bg-color: #ffffff;
        --el-bg-color-page: #f0f3ff;
        --el-bg-color-overlay: #ffffff;
        --el-text-color-primary: #1e1b2e;
        --el-text-color-regular: #5c5a72;
        --el-text-color-secondary: #8e8ca6;
        --el-text-color-placeholder: #b8b6c8;
        --el-border-color: rgba(200,210,240,0.4);
        --el-border-color-light: rgba(200,210,240,0.3);
        --el-border-color-lighter: rgba(200,210,240,0.2);
        --el-border-color-extra-light: rgba(200,210,240,0.12);
        --el-fill-color: rgba(99,102,241,0.04);
        --el-fill-color-light: rgba(99,102,241,0.03);
        --el-fill-color-lighter: rgba(99,102,241,0.02);
        --el-fill-color-blank: transparent;
        --el-mask-color: rgba(240,243,255,0.8);
        --el-box-shadow: 0 4px 16px rgba(100,100,160,0.08);
        --el-box-shadow-light: 0 2px 8px rgba(100,100,160,0.06);
      }

      body { background: var(--bg-void) !important; color: var(--text-primary); }

      /* ── Scrollbar ── */
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(99,102,241,0.15); border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(99,102,241,0.35); }

      /* ── El Card (Glass) ── */
      .el-card { background: var(--glass-3) !important; border: 1px solid var(--glass-border) !important; border-radius: var(--r-lg) !important; box-shadow: var(--shadow-2), var(--shadow-inset) !important; backdrop-filter: blur(12px) saturate(150%); -webkit-backdrop-filter: blur(12px) saturate(150%); transition: all var(--dur-fast) var(--ease-out); }
      .el-card:hover { border-color: rgba(99,102,241,0.2) !important; box-shadow: var(--shadow-3), var(--shadow-inset) !important; }
      .el-card__header { border-bottom: 1px solid var(--glass-border-soft) !important; }

      /* ── El Table (Glass) ── */
      .el-table { background: transparent !important; --el-table-bg-color: transparent; --el-table-tr-bg-color: transparent; --el-table-header-bg-color: rgba(99,102,241,0.04); --el-table-border-color: rgba(200,210,240,0.25); --el-table-row-hover-bg-color: rgba(99,102,241,0.06); --el-table-text-color: var(--text-primary); --el-table-header-text-color: var(--text-secondary); }
      .el-table th.el-table__cell { background: rgba(99,102,241,0.04) !important; border-bottom: 1px solid rgba(200,210,240,0.3) !important; font-weight: 600; }
      .el-table td.el-table__cell { border-bottom: 1px solid rgba(200,210,240,0.15) !important; transition: background var(--dur-fast) var(--ease-out); }
      .el-table__empty-block { background: transparent; }
      .el-table--striped .el-table__body tr.el-table__row--striped td { background: rgba(99,102,241,0.02) !important; }

      /* ── El Dialog (Deep Glass) ── */
      .el-dialog { background: rgba(255,255,255,0.72) !important; border: 1px solid var(--glass-border) !important; border-radius: var(--r-xl) !important; box-shadow: var(--shadow-4), var(--shadow-glow) !important; backdrop-filter: blur(20px) saturate(160%); -webkit-backdrop-filter: blur(20px) saturate(160%); }
      .el-dialog__header { border-bottom: 1px solid var(--glass-border-soft); padding: 20px 24px !important; }
      .el-dialog__title { color: var(--text-primary) !important; font-weight: 600; }
      .el-dialog__body { color: var(--text-primary) !important; padding: 24px !important; }
      .el-dialog__footer { padding: 16px 24px 20px !important; }

      /* ── El Input (Glass) ── */
      .el-input__wrapper { background: var(--glass-2) !important; box-shadow: 0 0 0 1px var(--glass-border-soft) inset !important; border-radius: var(--r-sm) !important; transition: all var(--dur) var(--ease-out); }
      .el-input__wrapper:hover { box-shadow: 0 0 0 1px rgba(99,102,241,0.25) inset !important; background: var(--glass-3) !important; }
      .el-input__wrapper.is-focus { box-shadow: 0 0 0 2px var(--accent) inset, 0 0 0 4px rgba(99,102,241,0.15) inset !important; background: #fff !important; }
      .el-input__inner { color: var(--text-primary) !important; }
      .el-input__inner::placeholder { color: var(--text-muted) !important; }
      .el-textarea__inner { background: var(--glass-2) !important; box-shadow: 0 0 0 1px var(--glass-border-soft) inset !important; border-radius: var(--r-sm) !important; color: var(--text-primary) !important; }
      .el-textarea__inner:focus { box-shadow: 0 0 0 2px var(--accent) inset !important; background: #fff !important; }

      /* ── El Button (Glass + Gradient) ── */
      .el-button { border-radius: var(--r-sm) !important; font-weight: 500; transition: all var(--dur) var(--ease-spring); position: relative; overflow: hidden; }
      .el-button::after { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, transparent 0%, rgba(255,255,255,0.2) 50%, transparent 100%); transform: translateX(-100%); transition: transform 0.6s ease; }
      .el-button:hover::after { transform: translateX(100%); }
      .el-button--primary { background: var(--gradient-fire) !important; border: none !important; color: #fff !important; box-shadow: 0 4px 16px rgba(99,102,241,0.3) !important; }
      .el-button--primary:hover { transform: translateY(-2px) scale(1.02); box-shadow: 0 8px 28px rgba(99,102,241,0.4) !important; }
      .el-button--primary:active { transform: translateY(0) scale(0.97); }
      .el-button--default { background: var(--glass-2) !important; border: 1px solid var(--glass-border-soft) !important; color: var(--text-primary) !important; }
      .el-button--default:hover { background: var(--glass-hover) !important; border-color: rgba(99,102,241,0.3) !important; color: var(--accent) !important; transform: translateY(-1px); }
      .el-button--success { background: rgba(16,185,129,0.1) !important; border: 1px solid rgba(16,185,129,0.25) !important; color: var(--success) !important; }
      .el-button--success:hover { background: rgba(16,185,129,0.18) !important; transform: translateY(-1px); }
      .el-button--danger { background: rgba(239,68,68,0.1) !important; border: 1px solid rgba(239,68,68,0.25) !important; color: var(--danger) !important; }
      .el-button--danger:hover { background: rgba(239,68,68,0.18) !important; transform: translateY(-1px); }
      .el-button--warning { background: rgba(245,158,11,0.1) !important; border: 1px solid rgba(245,158,11,0.25) !important; color: var(--warning) !important; }
      .el-button--warning:hover { background: rgba(245,158,11,0.18) !important; transform: translateY(-1px); }

      /* ── El Tag ── */
      .el-tag { border-radius: 8px; border: none; font-weight: 500; }
      .el-tag--info { background: rgba(99,102,241,0.1) !important; color: var(--info) !important; }
      .el-tag--success { background: rgba(16,185,129,0.1) !important; color: var(--success) !important; }
      .el-tag--warning { background: rgba(245,158,11,0.1) !important; color: var(--warning) !important; }
      .el-tag--danger { background: rgba(239,68,68,0.1) !important; color: var(--danger) !important; }

      /* ── El Dropdown ── */
      .el-dropdown-menu { background: rgba(255,255,255,0.85) !important; border: 1px solid var(--glass-border) !important; border-radius: var(--r-sm) !important; box-shadow: var(--shadow-3) !important; backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
      .el-dropdown-menu__item { color: var(--text-primary) !important; }
      .el-dropdown-menu__item:hover { background: var(--accent-soft) !important; color: var(--accent) !important; }

      /* ── El Select / Descriptions / Form ── */
      .el-select__wrapper { background: var(--glass-2) !important; box-shadow: 0 0 0 1px var(--glass-border-soft) inset !important; border-radius: var(--r-sm) !important; }
      .el-select__wrapper.is-focused { box-shadow: 0 0 0 2px var(--accent) inset !important; }
      .el-select__placeholder, .el-select__selected-item { color: var(--text-primary) !important; }
      .el-descriptions { --el-descriptions-item-bordered-label-background: rgba(99,102,241,0.03); }
      .el-descriptions__label { color: var(--text-secondary) !important; }
      .el-descriptions__content { color: var(--text-primary) !important; }
      .el-descriptions__cell { border-color: var(--glass-border-soft) !important; }
      .el-empty__description { color: var(--text-muted); }
      .el-message { border-radius: var(--r-sm) !important; }
      .el-message-box { background: rgba(255,255,255,0.85) !important; border: 1px solid var(--glass-border) !important; border-radius: var(--r-lg) !important; box-shadow: var(--shadow-4) !important; backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
      .el-message-box__title { color: var(--text-primary) !important; }
      .el-message-box__content { color: var(--text-secondary) !important; }
      .el-popper { background: rgba(255,255,255,0.85) !important; border: 1px solid var(--glass-border) !important; color: var(--text-primary) !important; backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
      .el-loading-mask { background: rgba(240,243,255,0.65) !important; backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px); }
      .el-switch__label { color: var(--text-secondary) !important; }
      .el-switch.is-checked .el-switch__core { background: var(--accent) !important; border-color: var(--accent) !important; }

      /* ============================================================
         KEYFRAME ANIMATIONS
         ============================================================ */
      @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
      @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
      @keyframes scaleIn { from { opacity: 0; transform: scale(0.94); } to { opacity: 1; transform: scale(1); } }
      @keyframes slideRight { from { opacity: 0; transform: translateX(-16px); } to { opacity: 1; transform: translateX(0); } }
      @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
      @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
      @keyframes orbDrift1 { 0%,100% { transform: translate(0,0) scale(1); } 33% { transform: translate(100px,120px) scale(1.2); } 66% { transform: translate(-60px,80px) scale(0.85); } }
      @keyframes orbDrift2 { 0%,100% { transform: translate(0,0) scale(1); } 33% { transform: translate(-120px,-90px) scale(1.25); } 66% { transform: translate(80px,-50px) scale(0.8); } }
      @keyframes orbDrift3 { 0%,100% { transform: translate(0,0) scale(1); } 50% { transform: translate(-80px,100px) scale(1.3); } }
      @keyframes sparkPulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.12); } }
      @keyframes ringPulse { 0%,100% { transform: scale(1); opacity: 0.1; } 50% { transform: scale(1.3); opacity: 0.25; } }
      @keyframes spin { to { transform: rotate(360deg); } }
      @keyframes statusBreathe { 0%,100% { box-shadow: 0 0 0 0 currentColor; opacity: 1; } 50% { box-shadow: 0 0 0 6px transparent; opacity: 0.5; } }

      /* ── Liquid Edge Glow ── */
      @keyframes liquidGlow { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
      @keyframes liquidGlowBorder { 0% { background-position: 0% 0%; } 100% { background-position: 300% 0%; } }

      /* ── Skeleton loading ── */
      @keyframes skeletonPulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
      .skeleton { background: linear-gradient(90deg, rgba(99,102,241,0.06) 25%, rgba(99,102,241,0.12) 37%, rgba(99,102,241,0.06) 63%); background-size: 200% 100%; animation: shimmer 2s ease-in-out infinite; border-radius: var(--r-sm); }
      .skeleton-line { height: 14px; margin-bottom: 10px; }
      .skeleton-line.short { width: 60%; }
      .skeleton-block { height: 80px; }

      /* ── Utility ── */
      .anim-fade-up { animation: fadeUp 0.25s var(--ease-out) both; }
      .anim-fade-in { animation: fadeIn 0.2s var(--ease-out) both; }
      .anim-scale-in { animation: scaleIn var(--dur) var(--ease-spring) both; }
      .stagger-1 { animation-delay: 0.08s; }
      .stagger-2 { animation-delay: 0.16s; }
      .stagger-3 { animation-delay: 0.24s; }
      .stagger-4 { animation-delay: 0.32s; }

      /* ============================================================
         LOGIN PAGE
         ============================================================ */
      .login-page {
        position: relative; width: 100%; height: 100vh;
        display: flex; align-items: center; justify-content: center;
        background: var(--bg-void); overflow: hidden;
      }
      .login-page::before {
        content: ''; position: absolute; inset: 0;
        background:
          radial-gradient(ellipse at 20% 30%, rgba(123,140,255,0.18) 0%, transparent 50%),
          radial-gradient(ellipse at 80% 70%, rgba(167,139,250,0.15) 0%, transparent 50%),
          radial-gradient(ellipse at 50% 100%, rgba(103,232,249,0.1) 0%, transparent 60%),
          radial-gradient(ellipse at 70% 20%, rgba(110,231,183,0.08) 0%, transparent 50%);
        pointer-events: none;
      }
      .login-orb {
        position: absolute; border-radius: 50%; filter: blur(100px);
        pointer-events: none; will-change: transform;
      }
      .login-orb-1 { width: 520px; height: 520px; background: radial-gradient(circle, rgba(123,140,255,0.35) 0%, transparent 70%); top: -150px; left: -130px; animation: orbDrift1 22s ease-in-out infinite; }
      .login-orb-2 { width: 460px; height: 460px; background: radial-gradient(circle, rgba(167,139,250,0.3) 0%, transparent 70%); bottom: -130px; right: -110px; animation: orbDrift2 26s ease-in-out infinite; }
      .login-orb-3 { width: 400px; height: 400px; background: radial-gradient(circle, rgba(103,232,249,0.25) 0%, transparent 70%); top: 45%; left: 55%; animation: orbDrift3 30s ease-in-out infinite; }

      /* ── Liquid-Edge Login Card ── */
      .login-shell {
        position: relative; z-index: 2; width: 100%; max-width: 420px;
        padding: 2px; border-radius: var(--r-2xl);
        background: linear-gradient(135deg, rgba(123,140,255,0.3) 0%, rgba(167,139,250,0.2) 25%, rgba(103,232,249,0.3) 50%, rgba(110,231,183,0.2) 75%, rgba(123,140,255,0.3) 100%);
        background-size: 300% 300%;
        animation: scaleIn 0.8s var(--ease-spring) both, liquidGlow 6s ease-in-out infinite;
        box-shadow: var(--shadow-4), var(--shadow-glow);
      }
      .login-card {
        position: relative; border-radius: calc(var(--r-2xl) - 2px);
        padding: 48px 40px 36px;
        background: rgba(255,255,255,0.65);
        backdrop-filter: blur(40px) saturate(200%);
        -webkit-backdrop-filter: blur(40px) saturate(200%);
        box-shadow: var(--shadow-inset);
        overflow: hidden;
      }
      .login-header { text-align: center; margin-bottom: 36px; animation: fadeUp 0.7s var(--ease-out) 0.15s both; }
      .login-logo { position: relative; width: 72px; height: 72px; margin: 0 auto 18px; display: flex; align-items: center; justify-content: center; }
      .login-logo-emoji { font-size: 36px; filter: drop-shadow(0 4px 24px rgba(99,102,241,0.5)); animation: sparkPulse 2.5s ease-in-out infinite; }
      .login-logo-ring { position: absolute; inset: 0; border-radius: 50%; background: var(--gradient-fire); opacity: 0.1; filter: blur(20px); animation: ringPulse 3s ease-in-out infinite; }
      .login-title { font-size: 26px; font-weight: 700; letter-spacing: 0.5px; margin: 0 0 6px; color: var(--text-primary); }
      .login-subtitle { font-size: 12px; font-weight: 400; letter-spacing: 4px; color: var(--text-muted); margin: 0; text-transform: uppercase; }

      .login-form-item { margin-bottom: 22px; animation: fadeUp 0.7s var(--ease-out) both; }
      .login-form-item:nth-child(1) { animation-delay: 0.25s; }
      .login-form-item:nth-child(2) { animation-delay: 0.35s; }
      .login-btn-wrap { animation: fadeUp 0.7s var(--ease-out) 0.45s both; }
      .login-btn {
        position: relative; width: 100%; height: 50px; font-size: 15px; font-weight: 600;
        letter-spacing: 3px; border-radius: var(--r-md); border: none;
        background: var(--gradient-fire); color: #fff; overflow: hidden; cursor: pointer;
        box-shadow: 0 8px 28px rgba(99,102,241,0.25), var(--shadow-inset);
        transition: all var(--dur) var(--ease-spring);
      }
      .login-btn:hover { transform: translateY(-3px); box-shadow: 0 16px 40px rgba(99,102,241,0.4), 0 0 30px rgba(139,92,246,0.2), var(--shadow-inset); }
      .login-btn:active { transform: translateY(0) scale(0.97); }
      .login-btn::after { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, transparent 0%, rgba(255,255,255,0.25) 50%, transparent 100%); transform: translateX(-100%); transition: transform 0.6s ease; }
      .login-btn:hover::after { transform: translateX(100%); }

      /* ============================================================
         LAYOUT — Glass Sidebar + Content
         ============================================================ */
      .app-shell {
        display: flex; height: 100vh; background: var(--bg-void);
        position: relative; overflow: hidden;
      }
      .app-shell::before {
        content: ''; position: absolute; inset: 0; z-index: 0; pointer-events: none;
        background:
          radial-gradient(ellipse at 15% 20%, rgba(123,140,255,0.08) 0%, transparent 45%),

      /* ── Sidebar (Deep Glass) ── */
      .sidebar {
        position: relative; z-index: 10; width: 240px; flex-shrink: 0;

      .sidebar-menu { flex: 1; padding: 12px 12px; overflow-y: auto; }
      .sidebar-item {

      .sidebar-item.active::before {
        content: ''; position: absolute; left: -12px; top: 50%; transform: translateY(-50%);

      .sidebar-footer {

      /* ── Main Area ── */
      .main-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; position: relative; z-index: 5; }

      /* ── Topbar (Glass) ── */
      .topbar {

      .topbar-right { display: flex; align-items: center; gap: 20px; }
      .topbar-user { display: flex; align-items: center; gap: 12px; }
      .topbar-avatar {

      .topbar-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
      .topbar-username { color: var(--text-secondary); font-size: 14px; font-weight: 500; }

      .page-body { flex: 1; padding: 32px; overflow-y: auto; position: relative; contain: layout; }

      /* ── Route Transition ── */
      .fade-enter-active { animation: fadeUp 0.18s ease-out both; }
      .fade-leave-active { animation: fadeIn 0.1s ease-out reverse both; }

      /* ============================================================
         GLASS PANEL — Liquid-Edge Card
         ============================================================ */
      .glass-shell {
        padding: 2px; border-radius: var(--r-xl);
        background: linear-gradient(135deg, rgba(123,140,255,0.12) 0%, rgba(167,139,250,0.08) 25%, rgba(103,232,249,0.12) 50%, rgba(110,231,183,0.08) 75%, rgba(123,140,255,0.12) 100%);

      .glass-core {

      .panel-title {

      .panel-title-icon {

      /* ============================================================

      .home-hero {

        background: linear-gradient(135deg, rgba(123,140,255,0.1) 0%, rgba(167,139,250,0.06) 40%, rgba(103,232,249,0.08) 70%, rgba(110,231,183,0.06) 100%);

      }
      .home-hero::before {

      .home-hero-title { font-size: 24px; font-weight: 700; color: var(--text-primary); margin-bottom: 8px; position: relative; }

      /* ── Stats Tiles ── */
      .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 18px; margin-bottom: 28px; }
      .stat-tile {
        padding: 24px; border-radius: var(--r-lg);

        backdrop-filter: blur(10px) saturate(150%);

        box-shadow: var(--shadow-2), var(--shadow-inset);
        transition: all var(--dur) var(--ease-spring);
        cursor: default; position: relative; overflow: hidden;
      }
      .stat-tile::before {
        content: ''; position: absolute; inset: 0; border-radius: inherit;
        background: linear-gradient(135deg, transparent 0%, rgba(123,140,255,0.04) 50%, transparent 100%);
        opacity: 0; transition: opacity var(--dur) var(--ease-out);
      }
      .stat-tile:hover { border-color: rgba(123,140,255,0.25); transform: translateY(-4px) scale(1.02); box-shadow: var(--shadow-3), 0 0 30px rgba(99,102,241,0.08); }
      .stat-tile:hover::before { opacity: 1; }
      .stat-tile-icon {
        width: 44px; height: 44px; border-radius: 12px; margin-bottom: 18px;
        display: flex; align-items: center; justify-content: center;
      }
      .stat-tile-icon .el-icon { font-size: 22px; }
      .stat-tile-icon.accent { background: var(--accent-soft); } .stat-tile-icon.accent .el-icon { color: var(--accent); }
      .stat-tile-icon.purple { background: rgba(139,92,246,0.1); } .stat-tile-icon.purple .el-icon { color: var(--accent-purple); }
      .stat-tile-icon.mint { background: rgba(16,185,129,0.1); } .stat-tile-icon.mint .el-icon { color: var(--accent-mint); }
      .stat-tile-icon.cyan { background: rgba(6,182,212,0.1); } .stat-tile-icon.cyan .el-icon { color: var(--accent-cyan); }
      .stat-tile-label { font-size: 12px; color: var(--text-muted); margin-bottom: 8px; letter-spacing: 0.5px; text-transform: uppercase; }
      .stat-tile-value { font-size: 26px; font-weight: 700; color: var(--text-primary); display: flex; align-items: center; gap: 10px; }
      .status-pill { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

      .status-pill.offline { background: var(--text-muted); }

      /* ── Action Grid ── */
      .action-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
      .action-tile {
        padding: 20px 16px; border-radius: var(--r-md); text-align: center; cursor: pointer;
        background: var(--glass-2); border: 1px solid var(--glass-border-soft);
        transition: all var(--dur) var(--ease-spring); color: var(--text-primary); position: relative;
      }
      .action-tile::before {
        content: ''; position: absolute; inset: 0; border-radius: inherit;

        opacity: 0; transition: opacity var(--dur) var(--ease-out);
      }
      .action-tile:hover { background: var(--glass-hover); border-color: rgba(123,140,255,0.3); transform: translateY(-3px); box-shadow: 0 8px 24px rgba(99,102,241,0.1); }
      .action-tile:hover::before { opacity: 1; }
      .action-tile-icon { width: 38px; height: 38px; border-radius: 10px; margin: 0 auto 12px; display: flex; align-items: center; justify-content: center; }
      .action-tile-icon .el-icon { font-size: 20px; }
      .action-tile-icon.accent { background: var(--accent-soft); } .action-tile-icon.accent .el-icon { color: var(--accent); }
      .action-tile-icon.purple { background: rgba(139,92,246,0.1); } .action-tile-icon.purple .el-icon { color: var(--accent-purple); }
      .action-tile-icon.mint { background: rgba(16,185,129,0.1); } .action-tile-icon.mint .el-icon { color: var(--accent-mint); }
      .action-tile-icon.cyan { background: rgba(6,182,212,0.1); } .action-tile-icon.cyan .el-icon { color: var(--accent-cyan); }
      .action-tile-label { font-size: 14px; font-weight: 500; margin-bottom: 4px; }
      .action-tile-hint { font-size: 11px; color: var(--text-muted); }

      .info-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid rgba(200,210,240,0.2); }
      .info-row:last-child { border-bottom: none; }
      .info-row-label { font-size: 13px; color: var(--text-muted); }
      .info-row-value { font-size: 13px; color: var(--text-primary); font-weight: 500; }

      /* ============================================================
         FRIENDS PAGE
         ============================================================ */
      .toolbar-row { display: flex; gap: 14px; margin-bottom: 22px; flex-wrap: wrap; align-items: center; }
      .toolbar-row .el-input { max-width: 260px; }

      /* ============================================================
         TASKS PAGE
         ============================================================ */
      .task-summary-bar { display: flex; gap: 18px; margin-bottom: 22px; flex-wrap: wrap; }
      .task-summary-chip {
        padding: 12px 22px; border-radius: var(--r-md);
        background: rgba(255,255,255,0.5); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
        border: 1px solid var(--glass-border); transition: all var(--dur) var(--ease-out);
      }
      .task-summary-chip:hover { border-color: rgba(123,140,255,0.25); transform: translateY(-2px); }
      .task-summary-chip .label { font-size: 11px; color: var(--text-muted); display: block; letter-spacing: 0.5px; }
      .task-summary-chip .value { font-size: 20px; font-weight: 700; color: var(--text-primary); }

      /* ============================================================
         SETTINGS PAGE
         ============================================================ */
      .settings-stack { display: flex; flex-direction: column; gap: 22px; }

      /* ============================================================
         CHAT INTERFACE
         ============================================================ */
      .chat-shell { height: calc(100vh - 160px); min-height: 500px; }
      .chat-core { height: 100%; padding: 0 !important; overflow: hidden; }

      .chat-container { display: flex; height: 100%; }

      /* ── Chat Sidebar ── */
      .chat-sidebar {
        width: 280px; flex-shrink: 0; border-right: 1px solid var(--glass-border-soft);
        display: flex; flex-direction: column; background: var(--glass-1);
        backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      }
      .chat-sidebar-header {
        padding: 16px 16px 12px; display: flex; align-items: center;
        border-bottom: 1px solid var(--glass-border-soft);
      }
      .chat-friend-list { flex: 1; overflow-y: auto; padding: 8px; }
      .chat-friend-list::-webkit-scrollbar { width: 4px; }
      .chat-friend-list::-webkit-scrollbar-thumb { background: rgba(200,210,240,0.4); border-radius: 2px; }

      .chat-friend-item {
        display: flex; align-items: center; gap: 12px; padding: 12px 14px;
        border-radius: var(--r-sm); cursor: pointer; transition: all var(--dur-fast) var(--ease-out);
        margin-bottom: 3px;
      }
      .chat-friend-item:hover { background: var(--glass-2); transform: translateX(2px); }
      .chat-friend-item.active {
        background: var(--accent-soft);
        box-shadow: inset 4px 0 0 var(--accent);
      }
      .chat-friend-info { flex: 1; min-width: 0; }
      .chat-friend-name { font-size: 14px; font-weight: 500; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .chat-friend-fire { font-size: 12px; color: var(--accent-amber); margin-top: 3px; }

      /* ── Chat Main ── */
      .chat-main {
        flex: 1; display: flex; flex-direction: column; min-width: 0;
        background: var(--glass-1);
        backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      }
      .chat-header {
        display: flex; align-items: center; justify-content: space-between;
        padding: 16px 24px; border-bottom: 1px solid var(--glass-border-soft);
        background: var(--glass-2); flex-shrink: 0;
      }
      .chat-header-name { font-size: 17px; font-weight: 600; color: var(--text-primary); }

      /* ── Messages ── */
      .chat-messages { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 14px; }
      .chat-messages::-webkit-scrollbar { width: 6px; }
      .chat-messages::-webkit-scrollbar-thumb { background: rgba(200,210,240,0.4); border-radius: 3px; }

      .chat-msg-row { display: flex; align-items: flex-start; gap: 10px; animation: fadeUp var(--dur-fast) var(--ease-out) both; }
      .chat-msg-row.self { flex-direction: row-reverse; }
      .chat-avatar { flex-shrink: 0; }
      .chat-bubble { max-width: 60%; padding: 12px 16px; border-radius: var(--r-md); font-size: 14px; line-height: 1.5; word-break: break-word; position: relative; box-shadow: var(--shadow-1); }
      .bubble-self {
        background: var(--gradient-fire); color: #fff;
        border-radius: var(--r-md) var(--r-md) 4px var(--r-md);
      }
      .bubble-other {
        background: var(--glass-3); color: var(--text-primary);
        border: 1px solid var(--glass-border-soft);
        border-radius: var(--r-md) var(--r-md) var(--r-md) 4px;
      }

      .chat-loading, .chat-empty { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; gap: 6px; }

      /* ── Sticker Panel ── */
      .sticker-panel {
        max-height: 240px; overflow-y: auto; padding: 14px;
        background: var(--glass-2); border-top: 1px solid var(--glass-border-soft);
        backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      }
      .sticker-panel::-webkit-scrollbar { width: 4px; }
      .sticker-panel::-webkit-scrollbar-thumb { background: rgba(200,210,240,0.4); border-radius: 2px; }
      .sticker-tabs { display: flex; gap: 2px; padding: 0 0 8px 0; overflow-x: auto; border-bottom: 1px solid var(--glass-border-soft); margin-bottom: 8px; }
      .sticker-tabs::-webkit-scrollbar { height: 3px; }
      .sticker-tabs::-webkit-scrollbar-thumb { background: rgba(200,210,240,0.3); border-radius: 2px; }
      .sticker-tab { flex-shrink: 0; padding: 4px 8px; border-radius: var(--r-sm); cursor: pointer; color: var(--text-muted); transition: all var(--dur-fast) var(--ease-spring); border: 1px solid transparent; white-space: nowrap; display: flex; align-items: center; justify-content: center; min-width: 32px; min-height: 32px; }
      .sticker-tab:hover { background: var(--glass-hover); }
      .sticker-tab.active { background: var(--accent-soft); border-color: var(--accent); }
      .sticker-tab-icon { display: flex; align-items: center; justify-content: center; width: 22px; height: 22px; }
      .sticker-tab-icon svg { width: 20px; height: 20px; }
      .sticker-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(72px, 1fr)); gap: 10px; }
      .sticker-item {
        width: 72px; height: 72px; display: flex; align-items: center; justify-content: center;
        border-radius: var(--r-sm); cursor: pointer; overflow: hidden;
        background: var(--glass-3); border: 1px solid var(--glass-border-soft);
        transition: all var(--dur-fast) var(--ease-spring);
      }
      .sticker-item:hover { background: var(--glass-hover); transform: scale(1.1); box-shadow: var(--shadow-2), 0 0 16px rgba(99,102,241,0.1); }
      .sticker-item img { width: 100%; height: 100%; object-fit: cover; }
      .sticker-loading { display: flex; align-items: center; justify-content: center; padding: 32px; color: var(--text-muted); font-size: 14px; }

      /* ── Input Area ── */
      .chat-input-area {
        display: flex; align-items: flex-end; gap: 12px;
        padding: 16px 24px; border-top: 1px solid var(--glass-border-soft);
        background: var(--glass-2); flex-shrink: 0;
      }
      .sticker-btn {
        width: 36px; height: 36px; border-radius: 50%; border: none;
        background: var(--glass-3); cursor: pointer; font-size: 20px;
        display: flex; align-items: center; justify-content: center;
        flex-shrink: 0; transition: all var(--dur-fast) var(--ease-spring);
        border: 1px solid var(--glass-border-soft);
      }
      .sticker-btn:hover { background: var(--glass-hover); transform: scale(1.12); box-shadow: 0 0 12px rgba(99,102,241,0.15); }
      .sticker-btn.active { background: var(--accent-soft); border-color: var(--accent); }

      .chat-input-area .el-textarea__inner { border-radius: var(--r-md) !important; background: var(--glass-3) !important; border: 1px solid var(--glass-border-soft) !important; }

      .chat-placeholder { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }

      .sticker-slide-enter-active { animation: fadeUp var(--dur-fast) var(--ease-out) both; }
      .sticker-slide-leave-active { animation: fadeIn var(--dur-fast) var(--ease-out) reverse both; }

      /* ============================================================
         DESKTOP-ONLY — Wide Layout
         ============================================================ */
      @media (min-width: 1600px) {
        .sidebar { width: 260px; }
        .page-body { padding: 36px 40px; }
        .stats-row { grid-template-columns: repeat(4, 1fr); gap: 22px; }
        .action-grid { grid-template-columns: repeat(4, 1fr); gap: 16px; }
        .chat-sidebar { width: 300px; }
      }

      @media (min-width: 1200px) and (max-width: 1599px) {
        .stats-row { grid-template-columns: repeat(4, 1fr); }
        .action-grid { grid-template-columns: repeat(4, 1fr); }

      /* ── Reduced Motion ── */
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
      }
    </style>
  </head>

    <script src="/lib/axios.min.js"></script>
    <script>
      var missing = [];
      if (typeof Vue === 'undefined') missing.push('Vue');
      if (typeof VueRouter === 'undefined') missing.push('VueRouter');
      if (typeof ElementPlus === 'undefined') missing.push('ElementPlus');
      if (typeof ElementPlusIconsVue === 'undefined') missing.push('Icons');

        document.getElementById('loading-hint').innerHTML = '<div style="color:#ef4444;text-align:center"><h2>依赖加载失败</h2><p>缺失: ' + missing.join(', ') + '</p></div>';
        throw new Error('Missing: ' + missing.join(', '));
